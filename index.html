<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Plzeň</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Taxi Plzeň</h1>

<div class="space-y-4">

<input id="pickup" type="text" placeholder="Odkud jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="destination" type="text" placeholder="Kam jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="phone" type="tel" placeholder="Telefon"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<button onclick="createRide()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded mt-4">
Objednat jízdu
</button>

<p id="message" class="text-green-400 text-center mt-4"></p>

</div>
</div>

<script type="module">

// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  // lipeste aici config-ul tau
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.createRide = async function() {

const pickup = document.getElementById("pickup").value;
const destination = document.getElementById("destination").value;
const phone = document.getElementById("phone").value;

if(!pickup || !destination || !phone) {
alert("Vyplňte všechna pole");
return;
}

try {
await addDoc(collection(db, "rides"), {
pickup: pickup,
destination: destination,
phone: phone,
status: "new",
createdAt: serverTimestamp()
});

document.getElementById("message").innerText =
"Objednávka byla odeslána.";

document.getElementById("pickup").value = "";
document.getElementById("destination").value = "";
document.getElementById("phone").value = "";

} catch (e) {
alert("Chyba při odesílání.");
console.error(e);
}

}

</script>

</body>
</html>
