<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Plzeň</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.fade-out { opacity: 0; transition: opacity 0.5s ease; }
.fade-in { opacity: 1; transition: opacity 0.5s ease; }
</style>
</head>

<body class="bg-gray-900 text-white min-h-screen py-10">

<div id="arrivalOverlay" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50">
  <div class="text-center">
    <h2 class="text-4xl font-bold text-green-400 mb-4">🚕 Řidič přijel</h2>
    <p class="text-xl">Řidič je na místě. Prosím vyjděte ven.</p>
    <button onclick="closeArrival()" class="mt-6 bg-green-600 px-6 py-3 rounded font-bold">
      OK
    </button>
  </div>
</div>

<div class="w-full max-w-md mx-auto p-6 bg-gray-800 rounded-xl shadow-xl">

<h1 class="text-3xl font-bold mb-6 text-center">Taxi Plzeň</h1>

<div id="formSection" class="space-y-4">

<input id="pickup" type="text" placeholder="Odkud jedete?"
class="w-full p-3 rounded bg-gray-900 border border-gray-700">
<p id="pickupError" class="text-red-500 text-sm hidden"></p>

<input id="destination" type="text" placeholder="Kam jedete?"
class="w-full p-3 rounded bg-gray-900 border border-gray-700">
<p id="destinationError" class="text-red-500 text-sm hidden"></p>

<input id="phone" type="tel" placeholder="Telefon"
class="w-full p-3 rounded bg-gray-900 border border-gray-700">
<p id="phoneError" class="text-red-500 text-sm hidden"></p>

<p id="priceEstimate" class="text-green-400 font-bold text-lg"></p>
<p id="generalError" class="text-red-500 font-semibold hidden"></p>

<button onclick="calculateRoute()"
class="w-full bg-blue-500 text-white font-bold py-3 rounded mt-2">
Vypočítat cenu
</button>

<button onclick="createRide()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded mt-4">
Objednat jízdu
</button>

</div>

<div id="statusSection" class="hidden text-center mt-6">
<p class="text-lg">Stav objednávky:</p>
<p id="statusText" class="text-2xl font-bold mt-2"></p>
<p id="statusMessage" class="mt-4 text-gray-300"></p>

<button id="cancelBtn"
class="hidden mt-4 bg-red-600 px-6 py-3 rounded font-bold w-full">
❌ Zrušit jízdu
</button>

<button id="callBtn"
class="hidden mt-3 bg-green-600 px-6 py-3 rounded font-bold w-full">
📞 Volat řidiče
</button>

<button id="receiptBtn"
class="hidden mt-3 bg-green-600 px-6 py-3 rounded font-bold w-full">
📄 Stáhnout účtenku
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

/* ELEMENTS */
const pickupInput = document.getElementById("pickup");
const destinationInput = document.getElementById("destination");
const phoneInput = document.getElementById("phone");

const pickupError = document.getElementById("pickupError");
const destinationError = document.getElementById("destinationError");
const phoneError = document.getElementById("phoneError");
const generalError = document.getElementById("generalError");

const priceEstimate = document.getElementById("priceEstimate");
const formSection = document.getElementById("formSection");
const statusSection = document.getElementById("statusSection");
const statusText = document.getElementById("statusText");
const statusMessage = document.getElementById("statusMessage");
const receiptBtn = document.getElementById("receiptBtn");
const cancelBtn = document.getElementById("cancelBtn");
const callBtn = document.getElementById("callBtn");
const arrivalOverlay = document.getElementById("arrivalOverlay");

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
authDomain: "taxi-kristian.firebaseapp.com",
projectId: "taxi-kristian",
storageBucket: "taxi-kristian.firebasestorage.app",
messagingSenderId: "872925880546",
appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const messaging = getMessaging(app);

const DRIVER_PHONE = "+420777842870";

function resetErrors(){
pickupError.classList.add("hidden");
destinationError.classList.add("hidden");
phoneError.classList.add("hidden");
generalError.classList.add("hidden");
}

async function requestPushPermission(rideId){
try{
const permission = await Notification.requestPermission();
if(permission === "granted"){
const token = await getToken(messaging,{
vapidKey: "BNjO8QUOa0ncoJsS_XsEwYeWzwYzskAkbPGaMlDv4WOgvWXKQmsEMhKluwF_yPYxYkBKZqpDx05ERWQp2DI7-Ck"
});
if(token){
await updateDoc(doc(db,"rides",rideId),{ pushToken: token });
}
}
}catch(e){}
}

const GOOGLE_API_KEY = "AIzaSyB7yhLHZNZDmNIg_tjGQCXA78TPPrN8pQE";
const pricePerKm = 22;
const basePrice = 50;
const minimumPrice = 100;

let calculatedDistance = 0;
let calculatedPrice = 0;
let calculatedETA = 0;
let arrivalPlayed = false;

/* ROUTE */
window.calculateRoute = async function(){

resetErrors();

const pickup = pickupInput.value.trim();
const destination = destinationInput.value.trim();

let hasError=false;

if(!pickup){
pickupError.innerText="Zadejte místo odjezdu.";
pickupError.classList.remove("hidden");
hasError=true;
}

if(!destination){
destinationError.innerText="Zadejte cílovou adresu.";
destinationError.classList.remove("hidden");
hasError=true;
}

if(hasError) return;

const response = await fetch(
"https://routes.googleapis.com/directions/v2:computeRoutes",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Goog-Api-Key":GOOGLE_API_KEY,
"X-Goog-FieldMask":"routes.distanceMeters,routes.duration"
},
body:JSON.stringify({
origin:{address:pickup},
destination:{address:destination},
travelMode:"DRIVE"
})
}
);

const data = await response.json();
if(!data.routes?.length){
generalError.innerText="Chyba výpočtu trasy.";
generalError.classList.remove("hidden");
return;
}

const route = data.routes[0];
calculatedDistance = route.distanceMeters/1000;
const durationSeconds = parseInt(route.duration.replace("s",""));
calculatedETA = Math.ceil(durationSeconds/60);

let total = basePrice + calculatedDistance*pricePerKm;
if(total<minimumPrice) total=minimumPrice;

calculatedPrice = Math.round(total);

priceEstimate.innerText =
"Vzdálenost: "+calculatedDistance.toFixed(1)+
" km | "+calculatedETA+
" min | Cena: "+calculatedPrice+" Kč";
};

/* CREATE */
window.createRide = async function(){

resetErrors();

if(calculatedPrice===0){
generalError.innerText="Nejprve vypočítejte cenu.";
generalError.classList.remove("hidden");
return;
}

let phone = phoneInput.value.trim().replace(/\s+/g,"");
const phoneRegex=/^\+?[0-9]{8,15}$/;

if(!phoneRegex.test(phone)){
phoneError.innerText="Neplatné telefonní číslo.";
phoneError.classList.remove("hidden");
return;
}

const docRef = await addDoc(collection(db,"rides"),{
pickup:pickupInput.value.trim(),
destination:destinationInput.value.trim(),
phone,
distance:calculatedDistance,
estimatedPrice:calculatedPrice,
eta:calculatedETA,
status:"new",
createdAt:serverTimestamp()
});

localStorage.setItem("activeRideId",docRef.id);
await requestPushPermission(docRef.id);

formSection.classList.add("hidden");
statusSection.classList.remove("hidden");

listenToStatus(docRef.id);
};

function listenToStatus(id){

onSnapshot(doc(db,"rides",id),(snap)=>{

if(!snap.exists()) return;

const data=snap.data();

receiptBtn.classList.add("hidden");
cancelBtn.classList.add("hidden");
callBtn.classList.add("hidden");

if(data.status==="new"){
statusText.innerText="Nová";
statusMessage.innerText="Čekáme na potvrzení.";

cancelBtn.classList.remove("hidden");

  cancelBtn.onclick = async ()=>{

await updateDoc(doc(db,"rides",id),{ status:"cancelled" });

localStorage.removeItem("activeRideId");

statusSection.classList.add("hidden");
formSection.classList.remove("hidden");

/* 🔥 RESET COMPLET */
pickupInput.value="";
destinationInput.value="";
phoneInput.value="";
priceEstimate.innerText="";
calculatedDistance=0;
calculatedPrice=0;
calculatedETA=0;
arrivalPlayed=false;

};
}

if(data.status==="confirmed"){
statusText.innerText="Potvrzena";
statusMessage.innerText="Řidič dorazí za "+(data.eta||5)+" minut.";

callBtn.classList.remove("hidden");
callBtn.onclick = ()=> window.location.href="tel:"+DRIVER_PHONE;
}

if(data.status==="arrived"){
statusText.innerText="Řidič přijel";
statusMessage.innerText="Řidič je na místě.";

callBtn.classList.remove("hidden");
callBtn.onclick = ()=> window.location.href="tel:"+DRIVER_PHONE;
}

if(data.status==="completed"){

statusText.innerText="Dokončena";
statusMessage.innerText="Děkujeme za využití taxi služby.";

localStorage.removeItem("activeRideId");

/* 🔥 ARATĂ BUTONUL */
receiptBtn.classList.remove("hidden");

receiptBtn.onclick = function(){

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

const date = new Date(data.receiptDate?.seconds * 1000 || Date.now());

// HEADER
pdf.setFontSize(20);
pdf.setFont("helvetica","bold");
pdf.text("TAXI PLZEN",105,20,{align:"center"});

pdf.setFontSize(10);
pdf.setFont("helvetica","normal");
pdf.text("Taxi sluzba Plzen",105,28,{align:"center"});
pdf.text("Telefon: +420 XXX XXX XXX",105,34,{align:"center"});
pdf.text("Email: info@taxiplzen.cz",105,40,{align:"center"});

pdf.line(20,45,190,45);

// TITLE
pdf.setFontSize(14);
pdf.setFont("helvetica","bold");
pdf.text("UCTENKA",105,55,{align:"center"});

pdf.setFont("helvetica","normal");
pdf.setFontSize(11);

pdf.text("Cislo: "+(data.receiptNumber || "-"),20,70);
pdf.text("Datum: "+date.toLocaleDateString()+" "+date.toLocaleTimeString(),20,78);

pdf.line(20,85,190,85);

// CUSTOMER INFO
pdf.text("Odkud: "+data.pickup,20,100);
pdf.text("Kam: "+data.destination,20,110);
pdf.text("Telefon: "+(data.phone||"-"),20,120);

pdf.line(20,130,190,130);

// TOTAL
pdf.setFontSize(14);
pdf.setFont("helvetica","bold");
pdf.text("Celkem:",20,150);
pdf.text((data.estimatedPrice||0)+" KC",150,150);

pdf.line(20,160,190,160);

pdf.setFontSize(9);
pdf.setFont("helvetica","normal");
pdf.text("Dekuji za vyuziti nasi taxi sluzby.",105,175,{align:"center"});

pdf.save("uctenka_"+(data.receiptNumber||"taxi")+".pdf");
  
  /* 🔥 RESET DUPĂ DESCĂRCARE */
setTimeout(()=>{

statusSection.classList.add("hidden");
formSection.classList.remove("hidden");

pickupInput.value="";
destinationInput.value="";
phoneInput.value="";
priceEstimate.innerText="";

calculatedDistance=0;
calculatedPrice=0;
calculatedETA=0;
arrivalPlayed=false;

receiptBtn.classList.add("hidden");

},1000);

};
}

});
}

function showArrivalAlert(){
arrivalOverlay.classList.remove("hidden");
const audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
audio.play().catch(()=>{});
if(navigator.vibrate){
navigator.vibrate([300,200,300,200,600]);
}
}

window.closeArrival=function(){
arrivalOverlay.classList.add("hidden");
};

const savedRide = localStorage.getItem("activeRideId");
if(savedRide){
formSection.classList.add("hidden");
statusSection.classList.remove("hidden");
listenToStatus(savedRide);
}

</script>
</body>
</html>
