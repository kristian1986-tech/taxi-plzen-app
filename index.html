<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Plzeň</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.fade-out { opacity: 0; transition: opacity 0.5s ease; }
.fade-in { opacity: 1; transition: opacity 0.5s ease; }
</style>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Taxi Plzeň</h1>

<div id="formSection" class="space-y-4">

<input id="pickup" type="text" placeholder="Odkud jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="destination" type="text" placeholder="Kam jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="distance" type="number" placeholder="Přibližná vzdálenost (km)"
class="w-full p-3 rounded bg-gray-800 border border-gray-700"
oninput="calculatePrice()">

<input id="phone" type="tel" placeholder="Telefon"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<p id="priceEstimate" class="text-green-400 font-bold text-lg"></p>

<button onclick="createRide()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded mt-4">
Objednat jízdu
</button>

</div>

<div id="statusSection" class="hidden text-center mt-6">
<p class="text-lg">Stav objednávky:</p>
<p id="statusText" class="text-2xl font-bold mt-2"></p>
<p id="statusMessage" class="mt-4 text-gray-300"></p>

<a id="callDriverBtn"
href="tel:+420777123456"
class="hidden mt-6 inline-block bg-green-600 px-6 py-3 rounded font-bold">
📞 Zavolat řidiče
</a>

<p id="cancelTimer" class="mt-3 text-yellow-400 font-bold hidden"></p>

<button id="cancelBtn"
class="hidden mt-4 bg-red-600 px-6 py-3 rounded font-bold">
❌ Zrušit objednávku
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
authDomain: "taxi-kristian.firebaseapp.com",
projectId: "taxi-kristian",
storageBucket: "taxi-kristian.firebasestorage.app",
messagingSenderId: "872925880546",
appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const formSection = document.getElementById("formSection");
const statusSection = document.getElementById("statusSection");

let countdownInterval = null;

window.calculatePrice = function() {
const distance = parseFloat(document.getElementById("distance").value);
const basePrice = 50;
const pricePerKm = 25;

if(distance && distance > 0) {
const total = basePrice + (distance * pricePerKm);
document.getElementById("priceEstimate").innerText =
"Odhadovaná cena: " + total + " Kč";
} else {
document.getElementById("priceEstimate").innerText = "";
}
};

window.createRide = async function() {

if(localStorage.getItem("activeRideId")) {
alert("Máte již aktivní objednávku.");
return;
}

const pickup = document.getElementById("pickup").value.trim();
const destination = document.getElementById("destination").value.trim();
let phone = document.getElementById("phone").value.trim().replace(/\s+/g, "");
const distance = parseFloat(document.getElementById("distance").value) || 0;

const phoneRegex = /^\+?[0-9]{8,15}$/;
if(!phoneRegex.test(phone)) {
alert("Zadejte platné telefonní číslo.");
return;
}

if(!pickup || !destination) {
alert("Vyplňte všechna pole");
return;
}

const totalPrice = 50 + (distance * 30);

const docRef = await addDoc(collection(db, "rides"), {
pickup,
destination,
phone,
distance,
estimatedPrice: totalPrice,
status: "new",
createdAt: serverTimestamp()
});

localStorage.setItem("activeRideId", docRef.id);

formSection.classList.add("hidden");
statusSection.classList.remove("hidden");

listenToStatus(docRef.id);
};

function listenToStatus(rideId) {

const rideRef = doc(db, "rides", rideId);

onSnapshot(rideRef, (docSnap) => {

if (!docSnap.exists()) return;

const data = docSnap.data();
const statusText = document.getElementById("statusText");
const statusMessage = document.getElementById("statusMessage");
const callBtn = document.getElementById("callDriverBtn");
const cancelBtn = document.getElementById("cancelBtn");
const cancelTimer = document.getElementById("cancelTimer");

callBtn.classList.add("hidden");
cancelBtn.classList.add("hidden");
cancelTimer.classList.add("hidden");

if(countdownInterval) clearInterval(countdownInterval);

if(data.status === "new") {

statusText.innerText = "Nová (new)";
statusText.className = "text-2xl font-bold mt-2 text-yellow-400";
statusMessage.innerText = "Čekáme na potvrzení řidiče.";

cancelBtn.classList.remove("hidden");
cancelTimer.classList.remove("hidden");

let secondsLeft = 15;
cancelTimer.innerText = "Zrušit lze do: " + secondsLeft + " s";

countdownInterval = setInterval(() => {
secondsLeft--;
cancelTimer.innerText = "Zrušit lze do: " + secondsLeft + " s";

if(secondsLeft <= 0) {
clearInterval(countdownInterval);
cancelTimer.innerText = "Objednávku lze zrušit pouze telefonicky.";
cancelBtn.disabled = true;
cancelBtn.classList.add("opacity-50");
}
}, 1000);

cancelBtn.onclick = () => {
if(secondsLeft > 0) {
updateDoc(rideRef, { status: "cancelled" });
localStorage.removeItem("activeRideId");
} else {
alert("Objednávku lze zrušit pouze telefonicky.");
}
};

}

if(data.status === "confirmed") {
statusText.innerText = "Potvrzena (confirmed)";
statusText.className = "text-2xl font-bold mt-2 text-green-400";
statusMessage.innerText = "Řidič dorazí přibližně za " + (data.eta || 5) + " minut.";
callBtn.classList.remove("hidden");
}

if(data.status === "cancelled") {
statusText.innerText = "Zrušena (cancelled)";
statusText.className = "text-2xl font-bold mt-2 text-purple-400";
statusMessage.innerText = "Objednávka byla zrušena.";
autoReset();
}

if(data.status === "rejected") {
statusText.innerText = "Zamítnuta (rejected)";
statusText.className = "text-2xl font-bold mt-2 text-red-500";
statusMessage.innerText = "Řidič je momentálně nedostupný.";
autoReset();
}

if(data.status === "completed") {
statusText.innerText = "Dokončena (completed)";
statusText.className = "text-2xl font-bold mt-2 text-gray-400";
statusMessage.innerText = "Děkujeme za využití služby.";
autoReset();
}

});
}

function autoReset() {
setTimeout(() => {
localStorage.removeItem("activeRideId");
statusSection.classList.add("fade-out");

setTimeout(() => {
statusSection.classList.add("hidden");
statusSection.classList.remove("fade-out");
formSection.classList.remove("hidden");
resetForm();
}, 500);

}, 2500);
}

function resetForm() {
document.getElementById("pickup").value = "";
document.getElementById("destination").value = "";
document.getElementById("distance").value = "";
document.getElementById("phone").value = "";
document.getElementById("priceEstimate").innerText = "";
}

const savedRide = localStorage.getItem("activeRideId");
if(savedRide) {
formSection.classList.add("hidden");
statusSection.classList.remove("hidden");
listenToStatus(savedRide);
}

</script>

</body>
</html>
