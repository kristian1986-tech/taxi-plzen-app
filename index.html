<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Plzeň</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
.fade-out { opacity: 0; transition: opacity 0.5s ease; }
.fade-in { opacity: 1; transition: opacity 0.5s ease; }
</style>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Taxi Plzeň</h1>

<div id="formSection" class="space-y-4">

<input id="pickup" type="text" placeholder="Odkud jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="destination" type="text" placeholder="Kam jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="phone" type="tel" placeholder="Telefon"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<p id="priceEstimate" class="text-green-400 font-bold text-lg"></p>

<button onclick="calculateRoute()"
class="w-full bg-blue-500 text-white font-bold py-3 rounded mt-2">
Vypočítat cenu
</button>

<button onclick="createRide()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded mt-4">
Objednat jízdu
</button>

</div>

<div id="statusSection" class="hidden text-center mt-6">
<p class="text-lg">Stav objednávky:</p>
<p id="statusText" class="text-2xl font-bold mt-2"></p>
<p id="statusMessage" class="mt-4 text-gray-300"></p>

<button id="receiptBtn"
class="hidden mt-4 bg-green-600 px-6 py-3 rounded font-bold">
📄 Stáhnout účtenku
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
authDomain: "taxi-kristian.firebaseapp.com",
projectId: "taxi-kristian",
storageBucket: "taxi-kristian.firebasestorage.app",
messagingSenderId: "872925880546",
appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const GOOGLE_API_KEY = "AIzaSyCKv_QOjfni8LcTKN22mel7WE7czQK2QfM";

const pricePerKm = 25;
const basePrice = 50;
const minimumPrice = 100;

let calculatedDistance = 0;
let calculatedPrice = 0;

window.calculateRoute = async function() {

const pickup = document.getElementById("pickup").value.trim();
const destination = document.getElementById("destination").value.trim();

if(!pickup || !destination) {
alert("Vyplňte adresu odjezdu i cíle.");
return;
}

const response = await fetch(
"https://routes.googleapis.com/directions/v2:computeRoutes",
{
method: "POST",
headers: {
"Content-Type": "application/json",
"X-Goog-Api-Key": GOOGLE_API_KEY,
"X-Goog-FieldMask": "routes.distanceMeters"
},
body: JSON.stringify({
origin: { address: pickup },
destination: { address: destination },
travelMode: "DRIVE"
})
}
);

const data = await response.json();

if(!data.routes || !data.routes.length) {
alert("Nepodařilo se vypočítat trasu.");
return;
}

const distanceMeters = data.routes[0].distanceMeters;
calculatedDistance = distanceMeters / 1000;

let total = basePrice + (calculatedDistance * pricePerKm);
if(total < minimumPrice) total = minimumPrice;

calculatedPrice = Math.round(total);

document.getElementById("priceEstimate").innerText =
"Vzdálenost: " + calculatedDistance.toFixed(1) + " km | Cena: " + calculatedPrice + " Kč";
};

window.createRide = async function() {

if(calculatedPrice === 0) {
alert("Nejprve vypočítejte cenu.");
return;
}

const pickup = document.getElementById("pickup").value.trim();
const destination = document.getElementById("destination").value.trim();
let phone = document.getElementById("phone").value.trim().replace(/\s+/g, "");

const phoneRegex = /^\+?[0-9]{8,15}$/;
if(!phoneRegex.test(phone)) {
alert("Zadejte platné telefonní číslo.");
return;
}

const docRef = await addDoc(collection(db, "rides"), {
pickup,
destination,
phone,
distance: calculatedDistance,
estimatedPrice: calculatedPrice,
status: "new",
createdAt: serverTimestamp()
});

localStorage.setItem("activeRideId", docRef.id);

listenToStatus(docRef.id);

document.getElementById("formSection").classList.add("hidden");
document.getElementById("statusSection").classList.remove("hidden");
};

function listenToStatus(rideId){

const rideRef = doc(db,"rides",rideId);

onSnapshot(rideRef,(docSnap)=>{

if(!docSnap.exists()) return;

const data = docSnap.data();
const statusText = document.getElementById("statusText");
const statusMessage = document.getElementById("statusMessage");
const receiptBtn = document.getElementById("receiptBtn");

receiptBtn.classList.add("hidden");

if(data.status==="new"){
statusText.innerText="Nová (new)";
statusMessage.innerText="Čekáme na potvrzení řidiče.";
}

if(data.status==="confirmed"){
statusText.innerText="Potvrzena (confirmed)";
statusMessage.innerText="Řidič je na cestě.";
}

if(data.status==="completed"){
statusText.innerText="Dokončena (completed)";
statusMessage.innerText="Děkujeme za využití služby.";

if(data.receiptNumber){
receiptBtn.classList.remove("hidden");
receiptBtn.onclick=()=>generatePDF(data);
}

localStorage.removeItem("activeRideId");
}

});
}

function generatePDF(data){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(16);
doc.text("Účtenka", 20, 20);

doc.setFontSize(12);
doc.text("Číslo: " + data.receiptNumber, 20, 35);
doc.text("Datum: " + new Date(data.receiptDate.seconds * 1000).toLocaleDateString(), 20, 45);

doc.text("Firma: Nicolae Cristian", 20, 60);
doc.text("IČO: 06928391", 20, 70);
doc.text("Adresa: Komenskeho 1075/77, Plzen", 20, 80);
doc.text("Telefon: +420 777 842 870", 20, 90);
doc.text("Neplátce DPH", 20, 100);

doc.text("Trasa:", 20, 115);
doc.text(data.pickup + " → " + data.destination, 20, 125);

doc.text("Vzdálenost: " + data.distance.toFixed(1) + " km", 20, 140);
doc.text("Cena: " + data.estimatedPrice + " Kč", 20, 150);

doc.save("uctenka_" + data.receiptNumber + ".pdf");
}

const savedRide = localStorage.getItem("activeRideId");
if(savedRide){
document.getElementById("formSection").classList.add("hidden");
document.getElementById("statusSection").classList.remove("hidden");
listenToStatus(savedRide);
}

</script>

</body>
</html>
