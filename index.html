<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Plzeň</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Taxi Plzeň</h1>

<div id="formSection" class="space-y-4">

<input id="pickup" type="text" placeholder="Odkud jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="destination" type="text" placeholder="Kam jedete?"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="distance" type="number" placeholder="Přibližná vzdálenost (km)"
class="w-full p-3 rounded bg-gray-800 border border-gray-700"
oninput="calculatePrice()">

<input id="phone" type="tel" placeholder="Telefon"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<p id="priceEstimate" class="text-green-400 font-bold text-lg"></p>

<button onclick="createRide()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded mt-4">
Objednat jízdu
</button>

</div>

<div id="statusSection" class="hidden text-center mt-6">
<p class="text-lg">Stav objednávky:</p>
<p id="statusText" class="text-2xl font-bold mt-2"></p>
<p id="statusMessage" class="mt-4 text-gray-300"></p>

<a id="callDriverBtn"
href="tel:+420777842870"
class="hidden mt-6 inline-block bg-green-600 px-6 py-3 rounded font-bold">
📞 Zavolat řidiče
</a>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
  authDomain: "taxi-kristian.firebaseapp.com",
  projectId: "taxi-kristian",
  storageBucket: "taxi-kristian.firebasestorage.app",
  messagingSenderId: "872925880546",
  appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.calculatePrice = function() {

const distance = parseFloat(document.getElementById("distance").value);
const basePrice = 50;
const pricePerKm = 25;

if(distance && distance > 0) {
const total = basePrice + (distance * pricePerKm);
document.getElementById("priceEstimate").innerText =
"Odhadovaná cena: " + total + " Kč";
} else {
document.getElementById("priceEstimate").innerText = "";
}

};

window.createRide = async function() {

const pickup = document.getElementById("pickup").value;
const destination = document.getElementById("destination").value;
const phone = document.getElementById("phone").value;
const distance = parseFloat(document.getElementById("distance").value) || 0;

if(!pickup || !destination || !phone) {
alert("Vyplňte všechna pole");
return;
}

const basePrice = 50;
const pricePerKm = 30;
const totalPrice = basePrice + (distance * pricePerKm);

try {

const docRef = await addDoc(collection(db, "rides"), {
pickup,
destination,
phone,
distance,
estimatedPrice: totalPrice,
status: "new",
createdAt: serverTimestamp()
});

document.getElementById("formSection").classList.add("hidden");
document.getElementById("statusSection").classList.remove("hidden");

listenToStatus(docRef.id);

} catch (e) {
alert("Chyba při odesílání.");
console.error(e);
}

};

function listenToStatus(rideId) {

const rideRef = doc(db, "rides", rideId);

onSnapshot(rideRef, (docSnap) => {

if (docSnap.exists()) {

const data = docSnap.data();
const statusText = document.getElementById("statusText");
const statusMessage = document.getElementById("statusMessage");
const callBtn = document.getElementById("callDriverBtn");

callBtn.classList.add("hidden");

let czText = "";
let enText = "";
let message = "";

if(data.status === "new") {
czText = "Nová";
enText = "new";
message = "Čekáme na potvrzení řidiče.";
statusText.className = "text-2xl font-bold mt-2 text-yellow-400";
}

if(data.status === "confirmed") {
czText = "Potvrzena";
enText = "confirmed";
message = "Řidič dorazí přibližně za " + (data.eta || 5) + " minut.";
callBtn.classList.remove("hidden");
statusText.className = "text-2xl font-bold mt-2 text-green-400";
}

if(data.status === "rejected") {
czText = "Zamítnuta";
enText = "rejected";
message = "Řidič je momentálně nedostupný. Zkuste to prosím znovu.";
statusText.className = "text-2xl font-bold mt-2 text-red-500";
}

if(data.status === "completed") {
czText = "Dokončena";
enText = "completed";
message = "Děkujeme za využití naší služby.";
statusText.className = "text-2xl font-bold mt-2 text-gray-400";
}

statusText.innerText = czText + " (" + enText + ")";
statusMessage.innerText = message;

}

});

}

</script>

</body>
</html>
